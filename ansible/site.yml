---
# ===================================================================
# InfraVault-Labs - Orquestador Maestro de Despliegue (site.yml)
# ===================================================================

- name: Fase 1 - Inicialización y Preparación de Nodos Proxmox
  hosts: proxmox
  gather_facts: yes
  become: true
  roles:
    - proxmox_base

- name: Fase 2 - Configuración del Clúster y Alta Disponibilidad (HA)
  hosts: proxmox
  gather_facts: yes
  become: true
  roles:
    - proxmox_cluster

- name: Fase 3 - Protección Eléctrica Crítica (Monitoreo NUT)
  hosts: proxmox
  gather_facts: yes
  become: true
  roles:
    - nut_ups